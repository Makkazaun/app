# Edelzaun App – Nginx Reverse-Proxy
# Datei wird von ship-it.sh nach /etc/nginx/sites-available/edelzaun kopiert.
# Certbot ergänzt automatisch den HTTPS-Block (ssl_certificate etc.)

server {
    listen 80;
    listen [::]:80;
    server_name app.edelzaun-tor.de;

    # Let's Encrypt Challenge (Certbot braucht das)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Alle anderen Anfragen → Next.js App auf Port 3000
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts für JTL-DB-Abfragen
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        # PDF-Upload bis 25 MB
        client_max_body_size 25M;
    }

    # Next.js statische Assets direkt aus Dateisystem
    location /_next/static/ {
        alias /var/www/edelzaun-app/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Öffentliche Dateien (public/)
    location /public/ {
        alias /var/www/edelzaun-app/public/;
        expires 7d;
        access_log off;
    }
}
